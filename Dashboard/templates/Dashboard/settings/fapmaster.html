<form id="form_FapMaster" class="mb-3">
  {% csrf_token %}
  <h3>撸大湿</h3>
  <div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" role="switch" name="publicize_log" id="publicize_log" 
      {% if host.fapmaster_pref.publicize_log %}checked{% endif %}
      />
      <label class="form-check-label" for="publicize_log">公开记录（个人主页、排行榜等显示）</label>
    </div>
  </div>
</form>
<div id="ctl_FapMaster" class="d-none">
  <button type="submit" form="form_FapMaster" class="btn btn-primary">保存</button>
</div>
<hr />
