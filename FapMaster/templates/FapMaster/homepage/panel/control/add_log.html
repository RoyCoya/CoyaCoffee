<div class="modal fade" id="modal_add_log" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-success">回忆打卡</h5>
        <button type="button" class="close" data-bs-dismiss="modal"><span>×</span></button>
      </div>
      <div class="modal-body">
        <form id="form_add_log">
          {% csrf_token %}
          <div class="form-group mb-2">
            <label for="end_time"><span class="text-danger">*</span> 结束时间</label>
            <input type="datetime-local" class="form-control" id="end_time" name="end_time" required />
          </div>
          <div class="form-group mb-2">
            <label for="duration"><span class="text-secondary">持续时间</span></label>
            <!-- TODO: 自定义默认分钟数 -->
            <div class="input-group">
              <input type="number" value="15" class="form-control" id="duration" name="duration" step="1" />
              <span class="input-group-text">分钟</span>
            </div>
          </div>
          <div class="form-group mb-2">
            <label for="comments"><span class="text-secondary">备注</span></label>
            <input type="text" class="form-control" id="comments" name="comments" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="submit" form="form_add_log" class="btn btn-outline-success">保存</button>
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>
